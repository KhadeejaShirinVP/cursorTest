<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris Landing Page</title>
    <style>
      :root {
        --bg: #0b1020;
        --card: rgba(255, 255, 255, 0.06);
        --text: #e8eefc;
        --muted: rgba(232, 238, 252, 0.75);
        --accent: #4da3ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: radial-gradient(circle at 30% 20%, #17224a, var(--bg));
        color: var(--text);
      }

      .page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 680px;
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 28px;
        text-align: center;
        box-shadow: 0 16px 60px rgba(0, 0, 0, 0.4);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(34px, 5vw, 48px);
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.6;
      }

      .cta {
        display: inline-block;
        margin-top: 24px;
        padding: 12px 22px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(77, 163, 255, 0.2);
        color: var(--text);
        font-weight: 700;
        text-decoration: none;
      }

      .cta:hover {
        background: rgba(77, 163, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Tetris</h1>
        <p class="subtitle">
          Stack the blocks, clear lines, and chase your high score. Ready to play one of the most iconic arcade games?
        </p>
        <a class="cta" href="game.html">Play</a>
      </section>
    </main>
  </body>
</html>
