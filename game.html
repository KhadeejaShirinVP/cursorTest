<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris MVP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1 class="title">Tetris</h1>

        <div class="hud">
          <div class="hudItem">
            <div class="hudLabel">Score</div>
            <div id="score" class="hudValue">0</div>
          </div>
          <button id="restartBtn" class="btn" type="button">Restart</button>
        </div>

        <canvas id="game" width="240" height="480" aria-label="Tetris game board"></canvas>

        <p class="help">
          Controls: <kbd>←</kbd>/<kbd>→</kbd> move, <kbd>↓</kbd> drop, <kbd>Space</kbd> hard drop, <kbd>↑</kbd> rotate.
        </p>
      </section>
    </main>

    <script src="tetris.js"></script>
  </body>
</html>
